<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- nose -->
  <rect x="15" y="2" width="2" height="2" fill="#c0c0c8"/>
  <!-- fuselage -->
  <rect x="14" y="4" width="4" height="3" fill="#d0d0d8"/>
  <rect x="14" y="7" width="4" height="4" fill="#d8d8e0"/>
  <rect x="14" y="11" width="4" height="5" fill="#d0d0d8"/>
  <rect x="14" y="16" width="4" height="2" fill="#b8b8c0"/>
  <!-- cockpit -->
  <rect x="15" y="8" width="2" height="3" fill="#1a50a0"/>
  <!-- left wing -->
  <rect x="7" y="10" width="7" height="2" fill="#a0a0b0"/>
  <rect x="8" y="12" width="6" height="3" fill="#b0b0c0"/>
  <rect x="9" y="15" width="5" height="2" fill="#9090a0"/>
  <!-- right wing -->
  <rect x="18" y="10" width="7" height="2" fill="#a0a0b0"/>
  <rect x="18" y="12" width="6" height="3" fill="#b0b0c0"/>
  <rect x="18" y="15" width="5" height="2" fill="#9090a0"/>
  <!-- left engine -->
  <rect x="9" y="17" width="4" height="3" fill="#585860"/>
  <rect x="10" y="20" width="2" height="2" fill="#c03020"/>
  <!-- right engine -->
  <rect x="19" y="17" width="4" height="3" fill="#585860"/>
  <rect x="20" y="20" width="2" height="2" fill="#c03020"/>
  <!-- engine flames -->
  <rect x="10" y="22" width="2" height="2" fill="#d05020"/>
  <rect x="11" y="24" width="1" height="2" fill="#d08820"/>
  <rect x="20" y="22" width="2" height="2" fill="#d05020"/>
  <rect x="21" y="24" width="1" height="2" fill="#d08820"/>
</svg>
